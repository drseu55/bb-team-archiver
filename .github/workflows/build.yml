name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyinstaller flask
          pip install .

      - name: Build with PyInstaller
        run: pyinstaller --onefile --name bb-archive run.py

      - name: Rename for upload
        run: mv dist/bb-archive bb-archive-linux

      - uses: actions/upload-artifact@v4
        with:
          name: bb-archive-linux
          path: bb-archive-linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyinstaller flask
          pip install .

      - name: Build with PyInstaller
        run: pyinstaller --onefile --name bb-archive run.py

      - name: Rename for upload
        run: move dist\bb-archive.exe bb-archive-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: bb-archive-windows
          path: bb-archive-windows.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Create tag
        run: |
          TAG="v$(date +%Y%m%d)-${{ github.run_number }}"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag $TAG
          git push origin $TAG
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Build ${{ env.TAG }}
          body: |
            Automated build from commit ${{ github.sha }}
          files: |
            bb-archive-linux/bb-archive-linux
            bb-archive-windows/bb-archive-windows.exe
          make_latest: true
